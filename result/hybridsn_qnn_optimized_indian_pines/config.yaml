seed: 42
dataset:
  config: configs/data/indian_pines.yaml
hybridsn:
  metrics: result/hybridsn_tuning_indian_pines/best_metrics.json
  checkpoint: result/hybridsn_tuning_indian_pines/best_val_macro_f1.pt
training:
  epochs: 12
  patience: 5
  batch_size: 16
  device: auto
  learning_rate: 0.003
  weight_decay: 0.0001
qnn_grid: [{'model': 'linear_probe', 'learning_rate': 0.003, 'weight_decay': 0.0001}, {'model': 'residual_qnn', 'qubits': 4, 'layers': 1, 'entanglement': 'linear', 'learning_rate': 0.003, 'weight_decay': 0.0001, 'angle_scale': 3.141592653589793}, {'model': 'gated_residual_qnn', 'qubits': 4, 'layers': 1, 'entanglement': 'linear', 'gate_mode': 'scalar', 'learning_rate': 0.003, 'weight_decay': 0.0001, 'angle_scale': 3.141592653589793}]
output:
  root: result/hybridsn_qnn_optimized_indian_pines
